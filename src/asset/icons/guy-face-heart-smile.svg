<svg width="120" height="56" viewBox="0 0 120 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Guy LED Face - Heart Eyes Filled</title>
  <defs>
    <filter id="ledGlow" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#ledGlow)" stroke="#D7FF1F" fill="#D7FF1F" stroke-linecap="round" stroke-linejoin="round" stroke-width="3.6">
    <!-- left filled heart eye -->
    <path d="M24 19
             C24 14, 29 12, 32 16
             C35 12, 40 14, 40 19
             C40 24, 35 27, 32 31
             C29 27, 24 24, 24 19 Z" />
    <!-- right filled heart eye -->
    <path d="M80 19
             C80 14, 85 12, 88 16
             C91 12, 96 14, 96 19
             C96 24, 91 27, 88 31
             C85 27, 80 24, 80 19 Z" />
    <!-- mouth placed lower -->
    <path d="M46 38C51 44 69 44 74 38" fill="none" stroke-width="5.2"/>
  </g>
</svg>
